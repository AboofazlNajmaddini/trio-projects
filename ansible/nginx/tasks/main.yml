---
# tasks file for nginx
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Create custom index.html
  copy:
    file: index.html
    dest: /var/www/html/index.html
    mode: '0644'
  notify: restart nginx

- name: Ensure nginx is running
  service:
    name: nginx
    state: started
    enabled: yes