version: '3.8'

services:
  nginx:
    build: .
    container_name: nginx-container
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - my-network

  redis:
    image: redis:alpine
    container_name: redis-container
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - my-network
    volumes:
      - redis-data:/data

networks:
  my-network:
    driver: bridge

volumes:
  redis-data: